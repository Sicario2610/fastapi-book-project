name: CD Pipeline - Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: 13.53.197.235  # Your EC2 IP
          username: ubuntu
          key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
          script: |
            # Stop any existing processes
            sudo systemctl stop fastapi-app.service || true
            pid=$(sudo lsof -t -i:8000) || true
            if [ ! -z "$pid" ]; then
              sudo kill -9 $pid || true
            fi
            
            # Deploy updated code
            cd /home/ubuntu/fastapi-book-project
            git reset --hard origin/main
            git pull origin main
            
            # Update dependencies
            source venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt
            
            # Restart service
            sudo systemctl daemon-reload
            sudo systemctl enable fastapi-app.service
            sudo systemctl start fastapi-app.service
            
            # Verify deployment
            sleep 5
            sudo systemctl is-active --quiet fastapi-app.service || {
              echo "Service failed to start. Logs:"
              sudo journalctl -u fastapi-app.service --no-pager --lines=50
              exit 1
            }