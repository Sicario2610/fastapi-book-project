name: CI Pipeline

on:
  pull_request:
    branches:
      - main  # Run tests when a PR is opened against main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"  

      - name: Install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests with pytest
        run: |
          source venv/bin/activate
          pytest --maxfail=1 --disable-warnings --cov=. tests/  # Use --cov=. for full project coverage
